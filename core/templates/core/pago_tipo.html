{% extends 'core/base.html' %}

{% block title %}Tipo de Pago - Tai Chi{% endblock %}

{% block content %}
<div class="mb-10 text-center">
    <a href="{% url 'inicio' %}" class="text-slate-500 hover:text-white mb-6 inline-block">← Volver</a>
    <h1 class="text-4xl font-extrabold">¿Qué vas a abonar?</h1>
</div>

<form method="post" class="space-y-6">
    {% csrf_token %}
    
    <div class="grid gap-4">
        {% for choice in form.tipo.field.choices %}
            <label class="btn-huge relative block">
                <input type="radio" name="tipo" value="{{ choice.0 }}" class="peer hidden" {% if forloop.first %}checked{% endif %}>
                <div class="glass cursor-pointer rounded-3xl p-6 border-2 border-transparent peer-checked:border-amber-400 peer-checked:bg-amber-400/10 transition-all flex items-center justify-between">
                    <span class="text-2xl font-bold">{{ choice.1 }}</span>
                    <div class="w-6 h-6 rounded-full border-2 border-slate-600 peer-checked:border-amber-400 flex items-center justify-center">
                        <div class="w-3 h-3 rounded-full bg-amber-400 opacity-0 peer-checked:opacity-100 transition-opacity"></div>
                    </div>
                </div>
            </label>
        {% endfor %}
    </div>

    <!-- Mostrar cantidad solo si elige paquete (esto lo manejaremos simple para el MVP) -->
    <div id="cantidad-wrapper" class="space-y-2 mt-8">
        <label class="block text-sm font-semibold text-slate-400 ml-4">
            Cantidad de clases (si es paquete)
        </label>
        {{ form.cantidad_clases }}
    </div>

    <button type="submit" class="w-full bg-amber-400 text-slate-900 rounded-3xl py-6 text-2xl font-extrabold shadow-xl hover:bg-amber-300 transition-all mt-8">
        Siguiente
    </button>
</form>

<script>
    // Pequeño script para mostrar/ocultar cantidad de clases según selección
    const radios = document.querySelectorAll('input[name="tipo"]');
    const wrapper = document.getElementById('cantidad-wrapper');
    
    function toggleQuantity() {
        const selected = document.querySelector('input[name="tipo"]:checked').value;
        if (selected === 'paquete') {
            wrapper.style.display = 'block';
        } else {
            wrapper.style.display = 'none';
        }
    }

    radios.forEach(r => r.addEventListener('change', toggleQuantity));
    toggleQuantity(); // Run once at start
</script>
{% endblock %}
