{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Asociación Long Hu He{% endblock %}</title>
    <link rel="icon" type="image/png" href="{% static 'img/logo_long_hu_he.png' %}">
    <!-- Tailwind Custom Config is expected to be compiled, but for demo/MVP we use CDN with config -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cream: { 50: '#FFFDF5', 100: '#F5F5DC' },
                        brown: { 700: '#5D4037', 800: '#4E342E', 950: '#2D1B16' },
                        orange: { 500: '#FF8C00', 600: '#E67E22', 700: '#D35400' },
                        shaolin: { red: '#C53030' }
                    },
                    fontFamily: { sans: ['Montserrat', 'Roboto', 'sans-serif'] }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        body { 
            background-color: #000000; 
            color: #E8E5DA;
        }
        .shaolin-watermark {
            position: fixed;
            inset: 0;
            background-image: url("{% static 'img/logo_long_hu_he.png' %}?v=3");
            background-repeat: no-repeat;
            background-position: center;
            background-size: 65% auto;
            opacity: 0.15;
            pointer-events: none;
            z-index: -10;
        }
        .shaolin-shadow { filter: drop-shadow(0 10px 15px rgba(45, 27, 22, 0.08)); }
        .premium-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body class="font-sans antialiased text-[#E8E5DA]">
    <!-- Fondo Premium -->
    <div class="shaolin-watermark"></div>
    <div class="max-w-xl mx-auto min-h-screen flex flex-col px-4 py-8">
        
        {% if messages %}
            <div class="fixed top-4 left-0 right-0 z-50 px-4">
                {% for message in messages %}
                    <div class="max-w-md mx-auto bg-orange-500 text-white rounded-3xl p-6 shadow-2xl border-4 border-orange-600 flex items-center gap-4 animate-bounce">
                        <p class="text-xl font-bold">{{ message }}</p>
                    </div>
                {% endfor %}
            </div>
        {% endif %}

        <main class="flex-grow">
            {% block content %}{% endblock %}
        </main>

        <footer class="mt-16 text-center border-t border-white/5 pt-8 pb-4">
            <p class="text-white/40 text-lg font-medium italic">Disciplina · Humildad · Superacion</p>
            <p class="text-white/20 text-sm mt-2">© {% now "Y" %} Shaolin Long Hu He</p>
            <p class="text-white/10 text-xs mt-4">
                Creado por: <a href="https://lde-system.vercel.app/" target="_blank" class="hover:text-orange-500 transition-colors">LDE-System</a>
            </p>
        </footer>
    </div>
</body>
</html>
