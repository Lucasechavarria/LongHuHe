{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenidos - Long Hu He</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, #1a0a00 0%, #000000 70%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
            cursor: pointer;
            user-select: none;
        }

        /* La imagen flota libre, sin contenedor cuadrado ni fondo */
        .logo-img {
            width: 380px; /* Un poco más grande para que destaque */
            max-width: 85vw;
            height: auto;
            display: block;
            animation: float3d 6s ease-in-out infinite;
            /* SE ELIMINA mix-blend-mode PARA QUE NO SE APAGUE */
            filter:
                drop-shadow(0 0 30px rgba(255, 140, 0, 0.4))
                drop-shadow(0 15px 40px rgba(0, 0, 0, 0.9));
        }

        @keyframes float3d {
            0%   { transform: translateY(0px)   rotateY(-8deg)  rotateX(4deg); }
            25%  { transform: translateY(-15px)  rotateY(0deg)   rotateX(-2deg); }
            50%  { transform: translateY(-25px)  rotateY(8deg)   rotateX(-4deg); }
            75%  { transform: translateY(-12px)  rotateY(4deg)   rotateX(2deg); }
            100% { transform: translateY(0px)   rotateY(-8deg)  rotateX(4deg); }
        }

        /* Halo de luz detrás del logo */
        .glow {
            position: absolute;
            width: 280px;
            height: 280px;
            max-width: 80vw;
            max-height: 80vw;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 120, 0, 0.12) 0%, transparent 70%);
            animation: glow-pulse 6s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes glow-pulse {
            0%, 100% { transform: scale(1);   opacity: 0.6; }
            50%       { transform: scale(1.3); opacity: 0.3; }
        }

        /* Texto pulsante */
        .pulse-text {
            margin-top: 40px;
            color: rgba(255, 255, 255, 0.45);
            text-transform: uppercase;
            font-weight: 900;
            letter-spacing: 0.35em;
            font-size: 0.8rem;
            animation: pulse-op 2.5s ease-in-out infinite;
        }

        @keyframes pulse-op {
            0%, 100% { opacity: 0.25; }
            50%       { opacity: 1; }
        }

        /* Transición de salida al tocar */
        body.fade-out {
            animation: fadeOut 1.2s forwards ease-in-out;
        }

        @keyframes fadeOut {
            0%   { opacity: 1; filter: blur(0px); }
            100% { opacity: 0; filter: blur(15px); transform: scale(1.05); }
        }
    </style>
</head>
<body onclick="enterApp()">

    <!-- Halo de luz (solo fondo, no toca el logo) -->
    <div class="glow"></div>

    <!-- Logo PNG transparente flotando libre -->
    <img
        src="{% static 'img/Logo Long Hu He Transparent.png' %}"
        alt="Long Hu He Logo"
        class="logo-img"
    >

    <!-- Texto inferior -->
    <p class="pulse-text">Toca para entrar</p>

    <script>
        function enterApp() {
            document.body.classList.add('fade-out');
            setTimeout(() => {
                window.location.href = "{% url 'acceso_opciones' %}";
            }, 1000);
        }
    </script>
</body>
</html>
