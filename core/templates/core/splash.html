{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenidos - Long Hu He</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            background: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
            overflow: hidden;
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Montserrat', sans-serif;
        }

        .scene {
            width: 320px;
            height: 320px;
            perspective: 1200px;
            cursor: pointer;
            position: relative;
        }

        .logo-container {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            animation: float 6s ease-in-out infinite, rotate3d 12s linear infinite;
            background: transparent;
            border: none;
            outline: none;
        }

        .logo-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            backface-visibility: visible;
            transform: translateZ(20px);
            background: transparent;
            filter: drop-shadow(0 15px 35px rgba(255, 140, 0, 0.5))
                    drop-shadow(0 0 60px rgba(255, 100, 0, 0.2));
        }

        /* Efecto de sombra dinámica */
        .shadow {
            position: absolute;
            bottom: -60px;
            left: 50%;
            transform: translateX(-50%) rotateX(80deg);
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(255, 140, 0, 0.15) 0%, transparent 70%);
            filter: blur(20px);
            animation: shadow-scale 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotateX(5deg) rotateY(-5deg); }
            50% { transform: translateY(-30px) rotateX(-5deg) rotateY(10deg); }
        }

        @keyframes rotate3d {
            0% { transform: rotateY(-10deg) rotateX(5deg); }
            50% { transform: rotateY(15deg) rotateX(-10deg); }
            100% { transform: rotateY(-10deg) rotateX(5deg); }
        }

        @keyframes shadow-scale {
            0%, 100% { transform: translateX(-50%) rotateX(80deg) scale(1); opacity: 0.5; }
            50% { transform: translateX(-50%) rotateX(80deg) scale(1.3); opacity: 0.2; }
        }

        .pulse-text {
            position: absolute;
            bottom: -150px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            font-weight: 900;
            letter-spacing: 0.3em;
            font-size: 0.9rem;
            animation: pulse-op 2s infinite ease-in-out;
            white-space: nowrap;
        }

        @keyframes pulse-op {
            0%, 100% { opacity: 0.3; transform: translateX(-50%) scale(1); }
            50% { opacity: 1; transform: translateX(-50%) scale(1.05); }
        }

        /* Transición de salida */
        .fade-out {
            animation: fadeOut 1.5s forwards ease-in-out;
        }

        @keyframes fadeOut {
            0% { opacity: 1; filter: blur(0); }
            100% { opacity: 0; filter: blur(20px); transform: scale(1.2); }
        }
    </style>
</head>
<body onclick="enterApp()">
    <div id="main-scene" class="scene">
        <div class="shadow"></div>
        <div class="logo-container">
            <img src="{% static 'img/Logo Long Hu He.png' %}" alt="Long Hu He Logo" class="logo-img">
        </div>
        <div class="pulse-text">Toca para entrar</div>
    </div>

    <script>
        function enterApp() {
            document.body.classList.add('fade-out');
            setTimeout(() => {
                window.location.href = "{% url 'acceso_opciones' %}";
            }, 1000);
        }
    </script>
</body>
</html>
