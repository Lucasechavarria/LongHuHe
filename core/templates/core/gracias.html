{% extends 'core/base.html' %}

{% block title %}¡Gracias! - Long Hu He{% endblock %}

{% block content %}
<div class="text-center space-y-12">
    <div class="w-48 h-48 bg-orange-500 border-8 border-orange-600 rounded-full flex items-center justify-center mx-auto shadow-[0_0_60px_rgba(255,140,0,0.3)] animate-pulse">
        <span class="text-9xl text-white">✓</span>
    </div>
    
    <div class="space-y-4">
        <h1 class="text-6xl font-black tracking-tight uppercase text-white">¡Muchas gracias!</h1>
        <p class="text-white/40 text-2xl font-black italic max-w-lg mx-auto">Tu camino marcial ha sido registrado con honor en Long Hu He.</p>
    </div>
    
    <div class="pt-8">
        <a href="{% url 'inicio' %}" class="inline-block w-full bg-white/10 text-white rounded-[3rem] py-10 text-3xl font-black shadow-2xl hover:bg-yellow-500 hover:text-black hover:border-yellow-600 transition-all transform active:scale-95 uppercase tracking-tighter border border-white/5">
            Volver al inicio
        </a>
    </div>
</div>
{% endblock %}
