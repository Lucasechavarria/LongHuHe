{% extends 'base.html' %}

{% block title %}Identificación - Long Hu He{% endblock %}

{% block content %}
<div class="flex flex-col items-center justify-center min-h-[60vh] space-y-12">
    <div class="text-center space-y-4">
        <h2 class="text-6xl font-black tracking-tighter uppercase text-white leading-tight">
            Ingresa a la App
        </h2>
        <p class="text-white/40 text-xl font-bold uppercase tracking-widest">
            Usa tu DNI o Celular
        </p>
    </div>

    <div class="premium-card w-full rounded-[3rem] p-10 shadow-2xl">
        <form method="post" class="space-y-8">
            {% csrf_token %}
            
            <div class="relative group">
                <input type="text" 
                       name="identificador" 
                       required
                       placeholder="DNI"
                       class="w-full bg-white/5 border-4 border-white/5 rounded-3xl py-10 px-10 text-5xl font-black text-center text-white placeholder-white/20 focus:border-orange-500 focus:bg-white/10 transition-all outline-none uppercase tracking-tighter shadow-inner">
                
                <p class="text-white/20 text-center font-bold uppercase tracking-widest pt-4">Ej: 35123456</p>
            </div>

            <div class="pt-8 flex flex-col gap-6">
                <button type="submit" 
                        class="w-full bg-orange-500 text-white rounded-[2.5rem] py-8 text-3xl font-black uppercase shadow-[0_20px_50px_rgba(255,140,0,0.3)] hover:bg-orange-600 transition-all transform hover:scale-105 active:scale-95 tracking-widest">
                    INGRESAR
                </button>
                
                <div class="relative flex items-center py-4">
                    <div class="flex-grow border-t border-white/5"></div>
                    <span class="flex-shrink mx-4 text-white/10 uppercase font-black text-xs tracking-widest">O</span>
                    <div class="flex-grow border-t border-white/5"></div>
                </div>

                <a href="{% url 'onboarding' %}" 
                   class="w-full text-center py-6 border-4 border-dashed border-white/10 rounded-[2.5rem] text-white/40 font-black uppercase text-lg tracking-[0.2em] hover:border-orange-500/30 hover:text-white transition-all">
                    No soy alumno · INSCRIBIRME
                </a>
            </div>
        </form>
    </div>

    <!-- Decoration subtle -->
    <div class="opacity-20 flex gap-12 pt-10">
        <div class="w-2 h-2 rounded-full bg-white animate-ping"></div>
        <div class="w-2 h-2 rounded-full bg-white animate-pulse"></div>
        <div class="w-2 h-2 rounded-full bg-white animate-ping"></div>
    </div>
</div>
{% endblock %}
