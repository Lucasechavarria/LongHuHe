{% extends 'base.html' %}

{% block title %}Método de Pago - Tai Chi{% endblock %}

{% block content %}
<div class="mb-14 pt-6 text-center animate-fade-in">
    <a href="{% url 'pago_tipo' %}" class="bg-white/5 px-6 py-3 rounded-2xl text-white/40 hover:text-white transition-all border border-white/5 inline-flex items-center gap-2 mb-8">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
        Cambiar lo que voy a pagar
    </a>
    <h1 class="text-6xl font-black uppercase text-white tracking-tighter leading-none">¿Cómo vas a pagar?</h1>
    <p class="text-white/40 font-bold uppercase text-xs tracking-[0.3em] mt-4 italic">Selecciona el método más cómodo para ti</p>
</div>

<form method="post" class="space-y-8 max-w-2xl mx-auto pb-20">
    {% csrf_token %}
    
    <div class="grid gap-6">
        {% for choice in form.metodo.field.choices %}
            <label class="relative block group cursor-pointer">
                <input type="radio" name="metodo" value="{{ choice.0 }}" class="peer hidden" {% if forloop.first %}checked{% endif %}>
                <div class="premium-card rounded-[3rem] p-10 border-4 border-white/5 peer-checked:border-orange-500 peer-checked:bg-orange-500/10 transition-all transform peer-checked:scale-[1.02] flex items-center justify-between shadow-2xl relative overflow-hidden group-hover:border-white/10">
                    
                    {% if choice.0 == 'mercadopago' %}
                        <div class="absolute -right-10 -top-10 w-40 h-40 bg-[#009EE3]/10 rounded-full blur-[60px]"></div>
                    {% elif choice.0 == 'transferencia' %}
                        <div class="absolute -right-10 -top-10 w-40 h-40 bg-purple-500/10 rounded-full blur-[60px]"></div>
                    {% else %}
                        <div class="absolute -right-10 -top-10 w-40 h-40 bg-green-500/10 rounded-full blur-[60px]"></div>
                    {% endif %}

                    <div class="relative z-10 flex flex-col gap-1 items-start">
                        <span class="text-3xl font-black uppercase text-white tracking-tight">{{ choice.1 }}</span>
                        {% if choice.0 == 'mercadopago' %}
                            <span class="text-[10px] font-bold text-[#009EE3] uppercase tracking-[0.3em] italic">Pago instantáneo dentro de la App 📱</span>
                        {% elif choice.0 == 'transferencia' %}
                            <span class="text-[10px] font-bold text-purple-400 uppercase tracking-[0.3em] italic">Deberás subir una foto del ticket 📸</span>
                        {% elif choice.0 == 'efectivo' %}
                            <span class="text-[10px] font-bold text-green-400 uppercase tracking-[0.3em] italic">Paga en el dojo al maestro 🥋</span>
                        {% endif %}
                    </div>

                    <div class="w-10 h-10 rounded-full border-4 border-white/10 peer-checked:border-orange-500 flex items-center justify-center relative z-10">
                        <div class="w-4 h-4 rounded-full bg-orange-500 opacity-0 peer-checked:opacity-100 transition-opacity"></div>
                    </div>
                </div>
            </label>
        {% endfor %}
    </div>

    <div class="pt-10">
        <button type="submit" class="w-full bg-orange-500 text-white rounded-[3.5rem] py-10 text-4xl font-black shadow-[0_20px_60px_rgba(255,140,0,0.4)] hover:bg-orange-600 transition-all transform hover:scale-[1.02] active:scale-95 uppercase tracking-widest leading-none">
            SIGUIENTE PASO ➔
        </button>
    </div>
</form>
{% endblock %}
