{% extends 'base.html' %}

{% block title %}Escáner de Asistencia - Long Hu He{% endblock %}

{% block content %}
<div x-data="scannerApp()" class="min-h-[70vh] flex flex-col items-center justify-center py-6">
    
    <!-- Encabezado -->
    <div class="text-center mb-10">
        <h2 class="text-4xl font-black uppercase text-white tracking-widest">Escáner de Asistencia</h2>
        <p class="text-orange-500 font-bold uppercase tracking-widest text-xs mt-2">Profesor: {{ request.user_obj.nombre }}</p>
    </div>

    <!-- Contenedor del Escáner -->
    <div class="w-full max-w-md relative">
        <!-- Overlay de Feedback Visual -->
        <div x-show="feedback.active" 
             x-transition:enter="transition ease-out duration-300"
             x-transition:enter-start="opacity-0 scale-95"
             x-transition:enter-end="opacity-100 scale-100"
             class="absolute inset-0 z-20 flex flex-col items-center justify-center rounded-[3rem] p-8 text-center"
             :class="feedback.bgColor">
            
            <div class="bg-white/10 backdrop-blur-md rounded-full p-6 mb-6">
                <template x-if="feedback.success">
                    <svg class="w-20 h-20 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                </template>
                <template x-if="!feedback.success">
                    <svg class="w-20 h-20 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>
                </template>
            </div>

            <h3 class="text-3xl font-black text-white uppercase tracking-tight" x-text="feedback.title"></h3>
            <p class="text-white/80 font-bold mt-2" x-text="feedback.message"></p>
            
            <!-- Info del Alumno (si tuvo éxito) -->
            <template x-if="feedback.alumno">
                <div class="mt-8 bg-black/20 rounded-3xl p-6 border border-white/10 w-full">
                    <p class="text-[10px] uppercase font-black text-white/40 tracking-widest mb-1">Alumno Escaneado</p>
                    <p class="text-lg font-black text-white" x-text="feedback.alumno.nombre"></p>
                    <p class="text-xs font-bold text-white/60 uppercase" x-text="feedback.alumno.grado"></p>
                </div>
            </template>

            <button @click="resetFeedback" class="mt-10 bg-white text-black px-12 py-4 rounded-2xl font-black uppercase tracking-widest shadow-xl transform active:scale-95 transition-all">
                Siguiente
            </button>
        </div>

        <!-- El Lector QR -->
        <div id="reader" class="overflow-hidden rounded-[3rem] border-4 border-white/10 bg-black/40 shadow-2xl aspect-square"></div>
        
        <!-- Instrucciones -->
        <div class="mt-8 text-center">
            <div class="inline-flex items-center gap-2 bg-white/5 px-4 py-2 rounded-full border border-white/5">
                <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                <span class="text-[10px] font-black uppercase text-white/40 tracking-widest">Cámara Activa</span>
            </div>
            <p class="text-white/20 text-xs mt-4">Apunta la cámara al carnet del alumno</p>
        </div>
    </div>

</div>

<!-- Scripts -->
<script src="https://unpkg.com/html5-qrcode"></script>
<script>
function scannerApp() {
    return {
        feedback: {
            active: false,
            success: false,
            title: '',
            message: '',
            bgColor: '',
            alumno: null
        },
        scanner: null,

        init() {
            this.startScanner();
        },

        startScanner() {
            this.scanner = new Html5Qrcode("reader");
            const config = { fps: 10, qrbox: { width: 250, height: 250 } };

            this.scanner.start(
                { facingMode: "environment" },
                config,
                (decodedText) => this.processScan(decodedText)
            ).catch(err => {
                console.error("Error iniciando cámara:", err);
                alert("No se pudo acceder a la cámara. Verifica los permisos.");
            });
        },

        async processScan(uuid) {
            if (this.feedback.active) return;
            
            // Pausar escáner visualmente (opcional)
            // this.scanner.pause();

            try {
                const response = await fetch("{% url 'registrar_asistencia_qr' %}", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ uuid: uuid })
                });
                
                const result = await response.json();
                
                this.feedback.active = true;
                this.feedback.success = result.success;
                this.feedback.alumno = result.alumno;
                
                if (result.success) {
                    this.feedback.title = "¡ASISTENCIA OK!";
                    this.feedback.message = result.color === 'yellow' ? "Con advertencias médicas" : "Ingreso permitido";
                    this.feedback.bgColor = result.color === 'yellow' ? "bg-amber-500" : "bg-emerald-600";
                } else {
                    this.feedback.title = "ERROR";
                    this.feedback.message = result.message;
                    this.feedback.bgColor = result.color === 'red' ? "bg-rose-600" : "bg-orange-600";
                }

                // Sonido o vibración si el dispositivo lo permite
                if (window.navigator.vibrate) window.navigator.vibrate(200);

            } catch (err) {
                console.error("Error en el registro:", err);
            }
        },

        resetFeedback() {
            this.feedback.active = false;
            this.feedback.alumno = null;
            // this.scanner.resume();
        }
    }
}
</script>

<style>
    #reader video {
        object-fit: cover !important;
        width: 100% !important;
        height: 100% !important;
    }
    #reader__scan_region {
        background: transparent !important;
    }
    /* Estilo premium para el marco de html5-qrcode */
    #reader {
        border: none !important;
    }
</style>
{% endblock %}
